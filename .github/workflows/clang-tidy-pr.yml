name: clang-tidy-pr

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "Repository (owner/name)"
        required: true
        type: string
        default: "Vita3K/Vita3K"
      pr:
        description: "Pull Request number"
        required: true
        type: number

jobs:
  clang-tidy:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Install prerequisites
        run: sudo apt-get update && sudo apt-get install -y jq curl
      
      - name: Fetch PR metadata
        id: pr
        run: >
          curl -s
          -H "Authorization: Bearer $GITHUB_TOKEN"
          -H "Accept: application/vnd.github+json"
          https://api.github.com/repos/${{ inputs.repo }}/pulls/${{ inputs.pr }}
          > pr.json
      
      - name: Extract SHAs
        id: sha
        run: >
          set -e &&
          echo "head=$(jq -r .head.sha pr.json)" >> $GITHUB_OUTPUT &&
          echo "base=$(jq -r .base.sha pr.json)" >> $GITHUB_OUTPUT
      
      - name: Validate SHAs
        run: >
          test -n "${{ steps.sha.outputs.head }}" &&
          test -n "${{ steps.sha.outputs.base }}"
      - name: Checkout PR HEAD
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repo }}
          ref: ${{ steps.sha.outputs.head }}
          fetch-depth: 0
          submodules: recursive

      - name: Fetch PR base
        run: git fetch origin ${{ steps.sha.outputs.base }}

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y ninja-build cmake python3 jq curl

      - name: Install build deps
        run: sudo add-apt-repository -y ppa:mhier/libboost-latest && sudo apt update && sudo apt install -y libboost-filesystem1.83-dev libboost-program-options1.83-dev libboost-system1.83-dev libgtk-3-dev libsdl2-dev

      - name: Download clang-tidy-diff.py
        run: curl -sSL https://raw.githubusercontent.com/llvm/llvm-project/main/clang-tools-extra/clang-tidy/tool/clang-tidy-diff.py -o clang-tidy-diff.py && chmod +x clang-tidy-diff.py

      - name: Configure CMake
        run: cmake -S . -B build -G Ninja -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run clang-tidy-diff
        run: git diff -U0 ${{ steps.sha.outputs.base }}...${{ steps.sha.outputs.head }} | python3 ./clang-tidy-diff.py -p1 -path build -export-fixes clang-tidy-fixes.yaml || true

      - name: Convert to MSVC format
        run: >
          test -f clang-tidy-fixes.yaml &&
          sed -n 's/.*File: \(.*\)\n.*Line: \([0-9]*\)\n.*Column: \([0-9]*\).*\n.*Message: \(.*\)/\1(\2,\3): warning: \4/p'
          clang-tidy-fixes.yaml > clang-tidy-warnings.txt
          || echo "No new clang-tidy warnings" > clang-tidy-warnings.txt

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: clang-tidy-warnings
          path: clang-tidy-warnings.txt
