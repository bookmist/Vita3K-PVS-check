name: clang-tidy-pr

on:
  workflow_dispatch:
    inputs:
      pr:
        description: "Pull Request number"
        required: true
        type: number
      repo:
        description: "Target repository (owner/name)"
        required: true
        type: string
        default: "Vita3K/Vita3K"
      base:
        description: "Base branch (default: master)"
        required: false
        default: "master"
        type: string

defaults:
  run:
    shell: bash

jobs:
  clang-tidy:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.repo }}
          ref: refs/pull/${{ inputs.pr }}/head
          fetch-depth: 0
          submodules: recursive

      - name: Fetch base branch
        run: git fetch origin ${{ inputs.base }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y clang-tidy ninja-build cmake python3 curl

      - name: Install build dependencies
        run: sudo add-apt-repository -y ppa:mhier/libboost-latest && sudo apt-get update && sudo apt-get install -y libboost-filesystem1.83-dev libboost-program-options1.83-dev libboost-system1.83-dev libgtk-3-dev libsdl2-dev

      - name: Download clang-tidy-diff.py
        run: curl -sSL https://raw.githubusercontent.com/llvm/llvm-project/main/clang-tools-extra/clang-tidy/tool/clang-tidy-diff.py -o clang-tidy-diff.py && chmod +x clang-tidy-diff.py

      - name: Configure CMake (Ninja)
        run: cmake -S . -B build -G Ninja -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run clang-tidy-diff (PR only)
        run: git diff -U0 origin/${{ inputs.base }}...HEAD | python3 ./clang-tidy-diff.py -p1 -path build -export-fixes clang-tidy-fixes.yaml || true

      - name: Convert output to MSVC format
        run: >
          if [ -f clang-tidy-fixes.yaml ]; then
            sed -n 's/.*File: \(.*\)\n.*Line: \([0-9]*\)\n.*Column: \([0-9]*\).*\n.*Message: \(.*\)/\1(\2,\3): warning: \4/p'
            clang-tidy-fixes.yaml > clang-tidy-warnings.txt;
          else
            echo "No new clang-tidy warnings" > clang-tidy-warnings.txt;
          fi

      - name: Upload clang-tidy report
        uses: actions/upload-artifact@v7
        with:
          name: clang-tidy-warnings
          path: clang-tidy-warnings.txt
